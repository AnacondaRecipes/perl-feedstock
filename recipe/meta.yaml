{% set unix_version = "5.42.2" %}
{% set win_version = unix_version + ".1" %}

package:
  name: perl
  version: {{ unix_version }}  # [not win]
  version: {{ win_version }}   # [win]

source:
  - url: https://cpan.org/src/5.0/perl-{{ unix_version }}.tar.xz
    sha256: 0a585eeb9e363c0f80482ddb3571625250c2c86aeb408853e8ea50805cfb14bb
    patches:
      # conda binary prefix replacement pads shorter paths with NUL inside the
      # fixed-width literal; STR_WITH_LEN still passes sizeof()-1 → broken @INC.
      - patches/0001-S_mayberelocate-truncate-after-binary-prefix-padding.patch  # [unix]

build:
  number: 1
  string: {{ PKG_BUILDNUM }}_h{{ PKG_HASH }}_perl5

requirements:
  build:
    - make                  # [unix]
    - {{ stdlib('c') }}
    - {{ compiler('c') }}
    - binutils              # [linux]
    - msys2-sed             # [win]
    - python                # [unix]  # scrub-sysroot-in-config.py after install
    # If something needs to be compiled using Perl's C support,
    # you need to make sure the compiler is in same PREFIX as the perl
    # interpreter.
test:
  commands:
    - perl --help

about:
  home: https://www.perl.org/
  license: GPL-1.0-or-later OR Artistic-1.0-Perl
  license_file:
    - Artistic
    - Copying
  license_url: https://dev.perl.org/licenses/
  summary: "The Perl programming language interpreter."
  license_family: Other
  description: |
    Perl 5 is a highly capable, feature-rich programming language with over 29
    years of development. Perl 5 runs on over 100 platforms from portables to
    mainframes and is suitable for both rapid prototyping and large scale
    development projects.
  doc_url: https://www.perl.org/docs.html
  dev_url: https://github.com/Perl/perl5

extra:
  recipe-maintainers:
    - jakirkham
    - msarahan
    - mingwandroid
    - katietz
